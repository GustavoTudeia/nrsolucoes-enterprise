
name: playwright-e2e

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend env
        run: cp backend/.env.e2e.example backend/.env

      - name: Prepare frontend env
        run: cp frontend/.env.e2e.example frontend/.env.local

      - name: Start backend stack
        run: docker compose up -d db redis minio minio-init backend worker

      - name: Wait backend
        run: |
          for i in {1..60}; do
            curl -fsS http://127.0.0.1:8000/api/v1/health && exit 0
            sleep 3
          done
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev > /tmp/frontend.log 2>&1 &

      - name: Wait frontend
        run: |
          for i in {1..60}; do
            curl -fsS http://127.0.0.1:3000/ && exit 0
            sleep 3
          done
          cat /tmp/frontend.log || true
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          E2E_FRONTEND_URL: http://127.0.0.1:3000
          E2E_BACKEND_URL: http://127.0.0.1:8000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

      - name: Upload traces and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
