services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nr
      POSTGRES_PASSWORD: nr
      POSTGRES_DB: nrsolucoes
    ports:
      - "5432:5432"
    volumes:
      - nr_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nr -d nrsolucoes"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      - ENV=dev
      - AUTO_CREATE_SCHEMA=true
      - DATABASE_URL=postgresql+psycopg2://nr:nr@db:5432/nrsolucoes
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=CHANGE_ME_TO_A_LONG_RANDOM_SECRET
      - CORS_ORIGINS=http://localhost:3000
      - DEFAULT_MIN_ANON_THRESHOLD=5
      - DEV_RETURN_OTP=true
      - API_BASE_URL=http://localhost:8000
      - EMAIL_DELIVERY_MODE=worker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    environment:
      - ENV=dev
      - DATABASE_URL=postgresql+psycopg2://nr:nr@db:5432/nrsolucoes
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=CHANGE_ME_TO_A_LONG_RANDOM_SECRET
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: rq worker default --url redis://redis:6379/0

volumes:
  nr_db:
