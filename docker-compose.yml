version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nr
      POSTGRES_PASSWORD: nr
      POSTGRES_DB: nrsolucoes
    ports:
      - "5432:5432"
    volumes:
      - nr_db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9091:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/nrsolucoes || true &&
        echo '[{"AllowedOrigins":["http://localhost:3000"],"AllowedMethods":["GET","PUT","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"],"MaxAgeSeconds":3000}]' > /tmp/cors.json
        mc cors set local/nrsolucoes /tmp/cors.json || true &&
        mc ls local/nrsolucoes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - minio
      - minio-init
    command: sh -c "python -c 'from app.db.session import engine; from app.db.base import Base; from app.models import *; Base.metadata.create_all(bind=engine); print(\"Schema created!\")' && alembic upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  # Para dev local, recomenda-se rodar o frontend com `npm run dev` fora do docker.
  # Caso queira subir o frontend via docker, descomente e ajuste conforme necessário.
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   env_file:
  #     - ./frontend/.env.local
  #   depends_on:
  #     - backend
  #   ports:
  #     - "3000:3000"

volumes:
  nr_db:
  minio_data: