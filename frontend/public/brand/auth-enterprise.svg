<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowLg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="#6366f1" opacity="0.08"/>
  <circle cx="150" cy="500" r="100" fill="#10b981" opacity="0.08"/>
  <circle cx="700" cy="450" r="80" fill="#3b82f6" opacity="0.06"/>
  
  <!-- Main shield icon -->
  <g transform="translate(400, 200)" filter="url(#shadowLg)">
    <path d="M0 -80 L70 -50 L70 20 C70 60 35 90 0 110 C-35 90 -70 60 -70 20 L-70 -50 Z" 
          fill="url(#primaryGrad)"/>
    <path d="M-25 10 L-10 25 L30 -15" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Card 1 - LGPD -->
  <g transform="translate(120, 320)" filter="url(#shadow)">
    <rect width="160" height="100" rx="16" fill="white"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="#6366f1" opacity="0.1"/>
    <path transform="translate(30, 30)" d="M10 2a8 8 0 00-8 8v4a8 8 0 008 8h0a8 8 0 008-8v-4a8 8 0 00-8-8z" stroke="#6366f1" stroke-width="2" fill="none"/>
    <rect x="26" y="38" width="8" height="6" rx="1" fill="#6366f1"/>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">LGPD</text>
    <text x="55" y="80" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Compliant</text>
  </g>
  
  <!-- Card 2 - NR-1 -->
  <g transform="translate(320, 350)" filter="url(#shadow)">
    <rect width="160" height="100" rx="16" fill="white"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="#10b981" opacity="0.1"/>
    <path transform="translate(28, 28)" d="M12 2L2 7v6c0 5.55 3.84 10.74 10 12 6.16-1.26 10-6.45 10-12V7L12 2z" stroke="#10b981" stroke-width="2" fill="none"/>
    <path transform="translate(28, 28)" d="M9 12l2 2 4-4" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none"/>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">NR-1</text>
    <text x="55" y="80" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Aprovado</text>
  </g>
  
  <!-- Card 3 - Multi-tenant -->
  <g transform="translate(520, 320)" filter="url(#shadow)">
    <rect width="160" height="100" rx="16" fill="white"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="#3b82f6" opacity="0.1"/>
    <path transform="translate(28, 28)" d="M3 21h18M3 7v14M21 7v14M6 7h12M9 21V10M15 21V10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" fill="none"/>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Enterprise</text>
  </g>
  
  <!-- Connecting lines -->
  <path d="M200 370 Q260 300 400 280" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.3"/>
  <path d="M400 350 Q400 310 400 280" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.3"/>
  <path d="M600 370 Q540 300 400 280" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" fill="none" opacity="0.3"/>
  
  <!-- Bottom text area background -->
  <rect x="60" y="470" width="680" height="90" rx="20" fill="white" filter="url(#shadow)"/>
  
  <!-- Bottom content -->
  <text x="100" y="510" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1e293b">Plataforma Segura para Dados Sensíveis</text>
  <text x="100" y="535" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Governança, privacidade e conformidade em uma única solução enterprise.</text>
</svg>
