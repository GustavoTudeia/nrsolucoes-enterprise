<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primary2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#6366f1" opacity="0.05"/>
  <circle cx="700" cy="500" r="180" fill="#10b981" opacity="0.05"/>
  
  <!-- Central cycle diagram -->
  <g transform="translate(400, 280)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#e2e8f0" stroke-width="20"/>
    
    <!-- Progress segments -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#primary2)" stroke-width="20" 
            stroke-dasharray="110 770" stroke-dashoffset="0" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#green2)" stroke-width="20" 
            stroke-dasharray="110 770" stroke-dashoffset="-220" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#amber2)" stroke-width="20" 
            stroke-dasharray="110 770" stroke-dashoffset="-440" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#blue2)" stroke-width="20" 
            stroke-dasharray="110 770" stroke-dashoffset="-660" stroke-linecap="round"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="70" fill="white" filter="url(#shadow2)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Ciclo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Completo</text>
    <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">NR-1</text>
  </g>
  
  <!-- Step 1 - Diagnóstico -->
  <g transform="translate(400, 80)" filter="url(#shadowSm)">
    <rect x="-70" y="-30" width="140" height="60" rx="12" fill="white"/>
    <circle cx="-40" cy="0" r="16" fill="#6366f1" opacity="0.1"/>
    <path transform="translate(-52, -12)" d="M24 4v16M4 12h16" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Diagnóstico</text>
  </g>
  
  <!-- Step 2 - Análise -->
  <g transform="translate(580, 200)" filter="url(#shadowSm)">
    <rect x="-60" y="-30" width="120" height="60" rx="12" fill="white"/>
    <circle cx="-30" cy="0" r="16" fill="#10b981" opacity="0.1"/>
    <path transform="translate(-42, -12)" d="M4 20h4l4-16 4 24 4-8h4" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="10" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Análise</text>
  </g>
  
  <!-- Step 3 - Ação -->
  <g transform="translate(580, 360)" filter="url(#shadowSm)">
    <rect x="-60" y="-30" width="120" height="60" rx="12" fill="white"/>
    <circle cx="-30" cy="0" r="16" fill="#f59e0b" opacity="0.1"/>
    <path transform="translate(-42, -12)" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 104 0M9 5a2 2 0 004 0m-6 9l2 2 4-4" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="10" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Ação</text>
  </g>
  
  <!-- Step 4 - Evidência -->
  <g transform="translate(400, 480)" filter="url(#shadowSm)">
    <rect x="-70" y="-30" width="140" height="60" rx="12" fill="white"/>
    <circle cx="-40" cy="0" r="16" fill="#3b82f6" opacity="0.1"/>
    <path transform="translate(-52, -12)" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Evidência</text>
  </g>
  
  <!-- Step 5 - LMS -->
  <g transform="translate(220, 360)" filter="url(#shadowSm)">
    <rect x="-60" y="-30" width="120" height="60" rx="12" fill="white"/>
    <circle cx="-30" cy="0" r="16" fill="#8b5cf6" opacity="0.1"/>
    <path transform="translate(-42, -12)" d="M12 14l9-5-9-5-9 5 9 5zM12 14v7M21 9v7" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="10" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">LMS</text>
  </g>
  
  <!-- Step 6 - Monitoramento -->
  <g transform="translate(220, 200)" filter="url(#shadowSm)">
    <rect x="-70" y="-30" width="140" height="60" rx="12" fill="white"/>
    <circle cx="-40" cy="0" r="16" fill="#ec4899" opacity="0.1"/>
    <path transform="translate(-52, -12)" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke="#ec4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="5" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Monitoramento</text>
  </g>
  
  <!-- Arrows connecting steps -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="80" y="50" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Gestão de Riscos Psicossociais</text>
  <text x="80" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Plataforma enterprise para o ciclo completo da NR-1</text>
</svg>
