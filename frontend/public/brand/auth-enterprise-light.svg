<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.1"/>
    </filter>
    <clipPath id="chartClip"><rect x="0" y="0" width="200" height="80" rx="4"/></clipPath>
  </defs>

  <!-- Subtle dot grid pattern (background provided by CSS container) -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#c7d2fe" opacity="0.6"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Background glow orbs -->
  <ellipse cx="300" cy="250" rx="250" ry="200" fill="#6366f1" opacity="0.04"/>
  <ellipse cx="550" cy="350" rx="200" ry="180" fill="#3b82f6" opacity="0.03"/>
  <ellipse cx="150" cy="450" rx="150" ry="120" fill="#10b981" opacity="0.03"/>

  <!-- ============================================ -->
  <!-- MAIN DASHBOARD CARD (floating)               -->
  <!-- ============================================ -->
  <g transform="translate(80, 60)" filter="url(#softShadow)">
    <!-- Dashboard window -->
    <rect width="420" height="300" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="420" height="44" rx="16" fill="#ffffff"/>
    <rect y="32" width="420" height="12" fill="#ffffff"/>
    <line x1="0" y1="44" x2="420" y2="44" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="20" cy="22" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="38" cy="22" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="56" cy="22" r="5" fill="#10b981" opacity="0.8"/>
    <!-- Tab text -->
    <text x="80" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#64748b">Painel de Conformidade</text>

    <!-- Compliance score section -->
    <g transform="translate(20, 60)">
      <text font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#64748b" text-transform="uppercase" letter-spacing="1">CONFORMIDADE GERAL</text>
      <text y="30" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1e293b">94<tspan font-size="18" fill="#64748b">%</tspan></text>
      <!-- Mini sparkline -->
      <polyline points="120,30 130,25 140,27 150,18 160,20 170,12 180,15 190,8"
                stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="120" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">+12%</text>
    </g>

    <!-- Progress bars area -->
    <g transform="translate(20, 120)">
      <!-- NR-1 bar -->
      <text font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">NR-1 Treinamentos</text>
      <rect y="16" width="380" height="6" rx="3" fill="#e2e8f0"/>
      <rect y="16" width="342" height="6" rx="3" fill="url(#greenGrad)"/>
      <text x="348" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">90%</text>

      <!-- LGPD bar -->
      <text y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">LGPD Conformidade</text>
      <rect y="60" width="380" height="6" rx="3" fill="#e2e8f0"/>
      <rect y="60" width="361" height="6" rx="3" fill="url(#accentGrad)"/>
      <text x="367" y="67" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#818cf8">95%</text>

      <!-- eSocial bar -->
      <text y="88" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">eSocial Eventos</text>
      <rect y="104" width="380" height="6" rx="3" fill="#e2e8f0"/>
      <rect y="104" width="330" height="6" rx="3" fill="url(#blueGrad)"/>
      <text x="336" y="111" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#60a5fa">87%</text>

      <!-- Risk bar -->
      <text y="132" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Planos de Acao</text>
      <rect y="148" width="380" height="6" rx="3" fill="#e2e8f0"/>
      <rect y="148" width="296" height="6" rx="3" fill="url(#amberGrad)"/>
      <text x="302" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fbbf24">78%</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- FLOATING METRIC CARDS                        -->
  <!-- ============================================ -->

  <!-- Card: Colaboradores ativos -->
  <g transform="translate(530, 80)" filter="url(#cardShadow)">
    <rect width="200" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="28" cy="28" r="16" fill="#6366f1" opacity="0.1"/>
    <g transform="translate(20, 20)">
      <!-- People icon -->
      <circle cx="8" cy="6" r="4" stroke="#6366f1" stroke-width="1.5" fill="none"/>
      <path d="M0 16c0-4 4-6 8-6s8 2 8 6" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="52" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Colaboradores</text>
    <text x="52" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">2.847</text>
    <text x="52" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">+156 este mes</text>
  </g>

  <!-- Card: Certificados emitidos -->
  <g transform="translate(530, 190)" filter="url(#cardShadow)">
    <rect width="200" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="28" cy="28" r="16" fill="#10b981" opacity="0.1"/>
    <g transform="translate(18, 18)">
      <!-- Certificate/award icon -->
      <rect x="2" y="0" width="16" height="12" rx="2" stroke="#10b981" stroke-width="1.5" fill="none"/>
      <line x1="6" y1="4" x2="14" y2="4" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="8" x2="12" y2="8" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M7 12v6l3-2 3 2v-6" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="52" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Certificados NR-1</text>
    <text x="52" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">1.293</text>
    <text x="52" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">98.7% validos</text>
  </g>

  <!-- Card: Risk score -->
  <g transform="translate(530, 300)" filter="url(#cardShadow)">
    <rect width="200" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="28" cy="28" r="16" fill="#3b82f6" opacity="0.1"/>
    <g transform="translate(18, 18)">
      <!-- Shield check icon -->
      <path d="M10 1L1 5v5c0 5 4 9 9 10 5-1 9-5 9-10V5L10 1z" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
      <path d="M6 10l3 3 5-6" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="52" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Score de Risco</text>
    <text x="52" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#10b981">Baixo</text>
    <text x="52" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">3 dimensoes avaliadas</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM SECTION: Activity chart + Shield      -->
  <!-- ============================================ -->

  <!-- Activity chart card -->
  <g transform="translate(80, 390)" filter="url(#cardShadow)">
    <rect width="300" height="160" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="16" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748b">Treinamentos Concluidos</text>

    <!-- Bar chart -->
    <g transform="translate(16, 44)">
      <!-- Y axis labels -->
      <text x="-2" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8" text-anchor="end">100</text>
      <text x="-2" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8" text-anchor="end">50</text>
      <text x="-2" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8" text-anchor="end">0</text>
      <!-- Grid lines -->
      <line x1="8" y1="5" x2="270" y2="5" stroke="#e2e8f0" stroke-width="0.5"/>
      <line x1="8" y1="35" x2="270" y2="35" stroke="#e2e8f0" stroke-width="0.5"/>
      <line x1="8" y1="65" x2="270" y2="65" stroke="#e2e8f0" stroke-width="0.5"/>

      <!-- Bars -->
      <rect x="16" y="30" width="18" height="35" rx="3" fill="#6366f1" opacity="0.4"/>
      <rect x="42" y="22" width="18" height="43" rx="3" fill="#6366f1" opacity="0.5"/>
      <rect x="68" y="15" width="18" height="50" rx="3" fill="#6366f1" opacity="0.6"/>
      <rect x="94" y="25" width="18" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
      <rect x="120" y="10" width="18" height="55" rx="3" fill="#6366f1" opacity="0.7"/>
      <rect x="146" y="18" width="18" height="47" rx="3" fill="#6366f1" opacity="0.6"/>
      <rect x="172" y="8" width="18" height="57" rx="3" fill="#6366f1" opacity="0.8"/>
      <rect x="198" y="12" width="18" height="53" rx="3" fill="#6366f1" opacity="0.7"/>
      <rect x="224" y="5" width="18" height="60" rx="3" fill="url(#accentGrad)"/>

      <!-- Month labels -->
      <text x="22" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Jan</text>
      <text x="48" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Fev</text>
      <text x="74" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Mar</text>
      <text x="100" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Abr</text>
      <text x="126" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Mai</text>
      <text x="152" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Jun</text>
      <text x="178" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Jul</text>
      <text x="204" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">Ago</text>
      <text x="230" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6366f1">Set</text>
    </g>

    <!-- Total label -->
    <text x="16" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Total: <tspan fill="#1e293b" font-weight="600">4.721 concluidos</tspan></text>
  </g>

  <!-- Shield with lock - security badge -->
  <g transform="translate(440, 400)" filter="url(#glow)">
    <g transform="translate(0, 0)">
      <!-- Outer glow ring -->
      <circle cx="70" cy="70" r="68" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
      <circle cx="70" cy="70" r="58" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.1"/>

      <!-- Shield shape -->
      <path d="M70 15 L120 35 L120 75 C120 105 95 125 70 140 C45 125 20 105 20 75 L20 35 Z"
            fill="url(#shieldGrad)" opacity="0.9"/>
      <path d="M70 15 L120 35 L120 75 C120 105 95 125 70 140 C45 125 20 105 20 75 L20 35 Z"
            fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>

      <!-- Lock icon inside shield -->
      <rect x="55" y="62" width="30" height="24" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
      <path d="M62 62V54a8 8 0 0116 0v8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="70" cy="76" r="3" fill="white"/>
      <line x1="70" y1="79" x2="70" y2="82" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Security labels around shield -->
    <g transform="translate(150, 30)">
      <rect width="110" height="28" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1"/>
      <circle cx="16" cy="14" r="4" fill="#10b981"/>
      <text x="26" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Criptografia</text>
    </g>
    <g transform="translate(155, 68)">
      <rect width="96" height="28" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1"/>
      <circle cx="16" cy="14" r="4" fill="#10b981"/>
      <text x="26" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Multi-tenant</text>
    </g>
    <g transform="translate(148, 106)">
      <rect width="80" height="28" rx="14" fill="#ffffff" stroke="#e0e7ff" stroke-width="1"/>
      <circle cx="16" cy="14" r="4" fill="#10b981"/>
      <text x="26" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Auditoria</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- FLOATING ACCENT ELEMENTS                     -->
  <!-- ============================================ -->

  <!-- Animated pulse dots (decorative) -->
  <circle cx="520" cy="70" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="740" cy="160" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="750" cy="420" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="60" cy="380" r="2" fill="#818cf8" opacity="0.4"/>

  <!-- Connection lines between elements -->
  <line x1="500" y1="130" x2="530" y2="130" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="500" y1="240" x2="530" y2="240" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="500" y1="350" x2="530" y2="350" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="3,3"/>
</svg>